<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>30 Seconds Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const ROUND_TIMES = [13, 11, 10, 6];
    const TOTAL_ROUNDS = 4;

    const SCENARIOS = [
      {
        id: "flight",
        beats: [
          "You sit down. The test paper is face-down on your desk.",
          "You flip it over. Section A — fine. You know this.",
          "You turn to Section B. It's an entire section on a topic you never studied. Everyone around you is already writing.",
        ],
        choices: [
          { text: "Skip it and move to Section C", response: "flight" },
          { text: "Try to write something — anything", response: "fight" },
          { text: "Read it again, hoping it'll make sense", response: "freeze" },
          { text: "Ask the teacher if you can do an extra assignment instead", response: "fawn" },
        ],
        debrief: {
          response: "Flight",
          title: "That urge to escape?",
          body: "The need to skip ahead, to get away from the page, to be anywhere else. That's flight. Your brain detected a threat it couldn't handle — and wanted to get you out.",
        },
      },
      {
        id: "fight",
        beats: [
          "Your phone buzzes. Then again. Then again.",
          "You open the group chat. 47 unread messages. Someone posted a screenshot of something you said privately — taken completely out of context.",
          "People are replying with laughing emojis. Your best friend hasn't said anything. Three people are typing.",
        ],
        choices: [
          { text: "Send a voice note explaining yourself — now", response: "fight" },
          { text: "Screenshot everything and report it", response: "fight" },
          { text: "Leave the group immediately", response: "flight" },
          { text: "Send a laughing emoji too, like it doesn't bother you", response: "fawn" },
        ],
        debrief: {
          response: "Fight",
          title: "That heat in your chest?",
          body: "The urge to defend yourself, set the record straight, do something NOW. That's fight. Your brain decided this threat needed to be confronted — not escaped.",
        },
      },
      {
        id: "fawn",
        beats: [
          "Your teacher hands back the group assignment. Your group got 58%.",
          "You did your section properly. Two others didn't. The teacher looks at you and says, \"I expected more from you.\"",
          "Your group members are looking at you too. One of them says, \"Can you talk to the teacher for us?\"",
        ],
        choices: [
          { text: "Apologise to the teacher and promise to fix it", response: "fawn" },
          { text: "Volunteer to redo the whole assignment yourself", response: "fawn" },
          { text: "Say it wasn't your fault", response: "fight" },
          { text: "Say nothing", response: "freeze" },
        ],
        debrief: {
          response: "Fawn",
          title: "That instinct to smooth things over?",
          body: "Taking responsibility for something that wasn't yours. Keeping everyone comfortable — even at your own expense. That's fawn. Your brain decided the safest move was to please.",
        },
      },
      {
        id: "freeze",
        beats: [
          "Morning. You're running late. You get to the bus stop.",
          "The bus is gone. School starts in 20 minutes. You have R15 in your pocket.",
          "There's a taxi rank two blocks away but you've never taken one alone. Your phone is on 4%.",
        ],
        choices: [
          { text: "Run to the taxi rank", response: "fight" },
          { text: "Call someone before your phone dies", response: "flight" },
          { text: "Wait for the next bus — maybe it'll come", response: "freeze" },
          { text: "Ask a stranger at the stop for help", response: "fawn" },
        ],
        debrief: {
          response: "Freeze",
          title: "That blankness?",
          body: "Too many options, not enough time, body stuck. That's freeze. Your brain couldn't choose between fighting through it and escaping — so it hit pause.",
        },
      },
    ];

    const animations = `
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shakeHard {
        0%, 100% { transform: translateX(0); }
        15% { transform: translateX(-5px) rotate(-0.5deg); }
        30% { transform: translateX(5px) rotate(0.5deg); }
        45% { transform: translateX(-4px); }
        60% { transform: translateX(4px); }
        75% { transform: translateX(-2px); }
        90% { transform: translateX(2px); }
      }
      @keyframes pulseScale {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes beatReveal {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes rotateIcon {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    `;

    const C = {
      red: "#BF1717", black: "#000000", base: "#1a1a1a", white: "#FFFFFF",
      grey: "#E6E6E6", coral: "#F56042", amber: "#F7B41B",
      sky: "#84D3F1", midGrey: "#2a2a2a", lightText: "rgba(255,255,255,0.55)", sage: "#7CB69D",
    };

    const responseColors = {
      Fight:  { bg: C.coral, text: C.white },
      Flight: { bg: C.amber, text: C.black },
      Freeze: { bg: C.sky,   text: C.base  },
      Fawn:   { bg: C.sage,  text: C.base  },
    };

    const font = "'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif";

    const wrap = {
      fontFamily: font, minHeight: "100dvh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "24px 20px",
      boxSizing: "border-box", background: C.base, color: C.white,
      transition: "background 0.8s ease",
    };

    function useViewport() {
      const [vp, setVp] = useState({ w: window.innerWidth, h: window.innerHeight });
      useEffect(() => {
        const handler = () => setVp({ w: window.innerWidth, h: window.innerHeight });
        window.addEventListener("resize", handler);
        window.addEventListener("orientationchange", handler);
        return () => {
          window.removeEventListener("resize", handler);
          window.removeEventListener("orientationchange", handler);
        };
      }, []);
      return vp;
    }

    function RotatePrompt() {
      return (
        <div style={{ ...wrap, gap: 0, textAlign: "center" }}>
          <div style={{
            width: 64, height: 64, borderRadius: "50%", background: C.midGrey,
            display: "flex", alignItems: "center", justifyContent: "center",
            margin: "0 auto 20px", fontSize: 30, animation: "rotateIcon 2s linear infinite",
          }}>↻</div>
          <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 10px" }}>Rotate your device</h2>
          <p style={{ fontSize: 14, color: C.lightText, margin: 0, lineHeight: 1.55 }}>
            This experience is designed for landscape.
          </p>
        </div>
      );
    }

    function Intro({ onStart, compact }) {
      return (
        <div style={{ ...wrap, padding: compact ? "12px 20px" : "24px 20px" }}>
          <div style={{ maxWidth: 440, textAlign: "center", animation: "fadeIn 0.8s ease both" }}>
            <div style={{
              width: compact ? 44 : 56, height: compact ? 44 : 56, borderRadius: "50%",
              background: C.red, display: "flex", alignItems: "center", justifyContent: "center",
              margin: compact ? "0 auto 14px" : "0 auto 20px", fontSize: compact ? 20 : 26,
            }}>⚡</div>
            <h1 style={{
              fontSize: compact ? 21 : 26, fontWeight: 800,
              margin: compact ? "0 0 8px" : "0 0 10px", letterSpacing: "-0.4px", lineHeight: 1.25,
            }}>
              Before we start —<br />a quick challenge.
            </h1>
            <p style={{
              fontSize: compact ? 13 : 15, color: C.lightText,
              margin: compact ? "0 0 20px" : "0 0 32px", lineHeight: 1.55,
            }}>
              Four rounds. The clock is real.<br />Trust your gut. Go fast.
            </p>
            <button onClick={onStart} style={{
              background: C.red, color: C.white, border: "none", borderRadius: 10,
              padding: compact ? "12px 32px" : "14px 44px", fontSize: compact ? 15 : 17,
              fontWeight: 700, cursor: "pointer", fontFamily: font,
              transition: "transform 0.15s ease, box-shadow 0.15s ease",
              boxShadow: "0 4px 24px rgba(191,23,23,0.35)",
              WebkitTapHighlightColor: "transparent", minHeight: 44,
            }}
              onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.04)"; }}
              onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
            >
              I'm ready
            </button>
          </div>
        </div>
      );
    }

    function Round({ scenario, roundIndex, timerDuration, onComplete, compact }) {
      const [phase, setPhase] = useState("beats");
      const [beatIndex, setBeatIndex] = useState(0);
      const [timeLeft, setTimeLeft] = useState(timerDuration);
      const [chosen, setChosen] = useState(null);
      const [shaking, setShaking] = useState(false);
      const timerRef = useRef(null);

      useEffect(() => {
        if (phase !== "beats") return;
        if (beatIndex < scenario.beats.length - 1) {
          const t = setTimeout(() => setBeatIndex(b => b + 1), 2200);
          return () => clearTimeout(t);
        } else {
          const t = setTimeout(() => setPhase("choose"), 2400);
          return () => clearTimeout(t);
        }
      }, [phase, beatIndex, scenario.beats.length]);

      useEffect(() => {
        if (phase === "choose" && timeLeft > 0 && !chosen) {
          timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
          return () => clearTimeout(timerRef.current);
        }
        if (phase === "choose" && timeLeft <= 0 && !chosen) {
          setChosen("freeze");
          setPhase("debrief");
        }
      }, [phase, timeLeft, chosen]);

      useEffect(() => {
        const threshold = timerDuration <= 7 ? 3 : timerDuration <= 10 ? 4 : 5;
        if (timeLeft <= threshold && timeLeft > 0 && phase === "choose" && !chosen) {
          setShaking(true);
          const t = setTimeout(() => setShaking(false), 350);
          return () => clearTimeout(t);
        }
      }, [timeLeft, phase, chosen, timerDuration]);

      const handleChoice = useCallback((response) => {
        setChosen(response);
        clearTimeout(timerRef.current);
        setTimeout(() => setPhase("debrief"), 200);
      }, []);

      const timerPct = (timeLeft / timerDuration) * 100;
      const timerColor = timerPct > 50 ? C.white : timerPct > 25 ? C.amber : C.red;
      const timerSize = compact ? 56 : 72;
      const timerR = compact ? 24 : 32;
      const timerCenter = timerSize / 2;
      const p = compact ? "10px 16px" : "24px 20px";

      if (phase === "beats") {
        return (
          <div style={{ ...wrap, padding: p }}>
            <div style={{ maxWidth: 460, textAlign: "center" }}>
              <div style={{
                fontSize: 11, textTransform: "uppercase", letterSpacing: 3,
                color: C.lightText, marginBottom: compact ? 10 : 20, fontWeight: 700,
              }}>
                Round {roundIndex + 1} of {TOTAL_ROUNDS}
              </div>
              <div style={{ minHeight: compact ? 80 : 120, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                {scenario.beats.slice(0, beatIndex + 1).map((beat, i) => (
                  <p key={i} style={{
                    fontSize: i === beatIndex ? (compact ? 17 : 22) : (compact ? 13 : 17),
                    fontWeight: i === beatIndex ? 700 : 400,
                    color: i === beatIndex ? C.white : "rgba(255,255,255,0.35)",
                    lineHeight: 1.4, margin: compact ? "0 0 10px" : "0 0 14px",
                    animation: i === beatIndex ? "beatReveal 0.5s ease both" : "none",
                    transition: "color 0.4s ease, font-size 0.4s ease",
                  }}>
                    {beat}
                  </p>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (phase === "choose") {
        return (
          <div style={{
            ...wrap, padding: p,
            animation: shaking ? "shakeHard 0.35s ease" : "none",
            justifyContent: compact ? "flex-start" : "center",
            paddingTop: compact ? "10px" : "24px",
          }}>
            <div style={{ maxWidth: 460, width: "100%", textAlign: "center" }}>
              <div style={{ marginBottom: compact ? 10 : 20 }}>
                <div style={{
                  position: "relative", width: timerSize, height: timerSize, margin: "0 auto",
                  animation: timeLeft <= Math.ceil(timerDuration * 0.4) ? "pulseScale 0.7s ease infinite" : "none",
                }}>
                  <svg width={timerSize} height={timerSize} viewBox={`0 0 ${timerSize} ${timerSize}`}>
                    <circle cx={timerCenter} cy={timerCenter} r={timerR} fill="none"
                      stroke="rgba(255,255,255,0.08)" strokeWidth="4.5" />
                    <circle cx={timerCenter} cy={timerCenter} r={timerR} fill="none"
                      stroke={timerColor} strokeWidth="4.5" strokeLinecap="round"
                      strokeDasharray={`${2 * Math.PI * timerR}`}
                      strokeDashoffset={`${2 * Math.PI * timerR * (1 - timerPct / 100)}`}
                      transform={`rotate(-90 ${timerCenter} ${timerCenter})`}
                      style={{ transition: "stroke-dashoffset 1s linear, stroke 0.4s ease" }} />
                  </svg>
                  <div style={{
                    position: "absolute", inset: 0, display: "flex",
                    alignItems: "center", justifyContent: "center",
                    fontSize: compact ? 20 : 26, fontWeight: 800, color: timerColor,
                    fontVariantNumeric: "tabular-nums",
                  }}>
                    {timeLeft}
                  </div>
                </div>
              </div>
              <p style={{
                fontSize: compact ? 14 : 17, fontWeight: 600,
                margin: compact ? "0 0 4px" : "0 0 6px",
                lineHeight: 1.35, color: "rgba(255,255,255,0.8)",
              }}>
                {scenario.beats[scenario.beats.length - 1]}
              </p>
              <p style={{
                fontSize: compact ? 11 : 13, color: C.amber, fontWeight: 700,
                margin: compact ? "0 0 12px" : "0 0 20px",
                textTransform: "uppercase", letterSpacing: 2,
              }}>
                What do you do?
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: compact ? 7 : 10, animation: "slideUp 0.35s ease both" }}>
                {scenario.choices.map((c, i) => (
                  <button key={i} onClick={() => handleChoice(c.response)} style={{
                    background: C.midGrey, border: "1.5px solid rgba(255,255,255,0.1)",
                    borderRadius: 10, padding: compact ? "10px 14px" : "14px 18px",
                    color: C.white, fontSize: compact ? 13 : 15, fontWeight: 600,
                    cursor: "pointer", textAlign: "left", transition: "all 0.12s ease",
                    fontFamily: font, WebkitTapHighlightColor: "transparent", minHeight: 44,
                  }}
                    onMouseEnter={e => { e.currentTarget.style.background = "rgba(191,23,23,0.15)"; e.currentTarget.style.borderColor = C.red; e.currentTarget.style.transform = "translateX(4px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = C.midGrey; e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; e.currentTarget.style.transform = "translateX(0)"; }}
                  >
                    {c.text}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const db = scenario.debrief;
      const wasTimeout = chosen === "freeze" && scenario.id !== "freeze";
      const displayResponse = wasTimeout ? "Freeze" : db.response;
      const rc = responseColors[displayResponse];

      return (
        <div style={{ ...wrap, padding: p }}>
          <div style={{ maxWidth: 460, textAlign: "center", animation: "fadeIn 0.7s ease both" }}>
            <div style={{
              display: "inline-block", background: rc.bg, color: rc.text,
              borderRadius: 6, padding: "5px 14px", fontSize: 12,
              fontWeight: 800, textTransform: "uppercase", letterSpacing: 2,
              marginBottom: compact ? 10 : 16,
            }}>
              {displayResponse}
            </div>
            <h3 style={{
              fontSize: compact ? 20 : 24, fontWeight: 800,
              margin: compact ? "0 0 8px" : "0 0 12px", lineHeight: 1.2,
            }}>
              {wasTimeout ? "Time's up. You froze." : db.title}
            </h3>
            <p style={{
              fontSize: compact ? 13 : 15, lineHeight: 1.65,
              color: "rgba(255,255,255,0.8)", margin: compact ? "0 0 6px" : "0 0 8px",
            }}>
              {wasTimeout
                ? "You couldn't decide in time. That's not a failure — that's freeze. Your brain had too many options and not enough time, so it hit pause."
                : db.body}
            </p>
            <button onClick={() => onComplete(chosen)} style={{
              marginTop: compact ? 14 : 24, background: C.white, color: C.base,
              border: "none", borderRadius: 10,
              padding: compact ? "11px 28px" : "13px 36px",
              fontSize: compact ? 13 : 15, fontWeight: 700, cursor: "pointer",
              fontFamily: font, transition: "transform 0.15s ease",
              WebkitTapHighlightColor: "transparent", minHeight: 44,
            }}
              onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.04)"; }}
              onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
            >
              {roundIndex < TOTAL_ROUNDS - 1 ? "Next round →" : "See what just happened"}
            </button>
          </div>
        </div>
      );
    }

    function FinalReveal({ responses, compact }) {
      const scenarioLabels = ["The test", "The group chat", "The assignment", "The bus stop"];
      const labels = responses.map((r, i) => {
        const name = r.charAt(0).toUpperCase() + r.slice(1);
        return { round: i + 1, scenario: scenarioLabels[i], response: name, ...responseColors[name] };
      });

      return (
        <div style={{ ...wrap, padding: compact ? "12px 20px" : "24px 20px" }}>
          <div style={{ maxWidth: 520, width: "100%", textAlign: "center", animation: "fadeIn 0.9s ease both" }}>
            <h2 style={{
              fontSize: compact ? 20 : 26, fontWeight: 800,
              margin: compact ? "0 0 6px" : "0 0 8px", lineHeight: 1.25,
            }}>
              Fight. Flight. Fawn. Freeze.
            </h2>
            <p style={{
              fontSize: compact ? 13 : 15, color: C.lightText,
              margin: compact ? "0 0 16px" : "0 0 28px", lineHeight: 1.5,
            }}>
              You just experienced all four — in under three minutes.<br />
              And every response was valid.
            </p>
            <div style={{
              display: "flex", gap: compact ? 8 : 10,
              marginBottom: compact ? 16 : 28, justifyContent: "center", flexWrap: "wrap",
            }}>
              {labels.map((r, i) => (
                <div key={i} style={{
                  background: C.midGrey, borderRadius: 10,
                  padding: compact ? "10px" : "14px",
                  minWidth: compact ? 90 : 110, flex: "1 1 90px",
                  maxWidth: compact ? 110 : 130,
                  animation: "slideUp 0.5s ease both",
                  animationDelay: `${i * 0.15}s`, opacity: 0,
                }}>
                  <div style={{
                    fontSize: 10, color: C.lightText,
                    marginBottom: compact ? 6 : 8,
                    fontWeight: 600, textTransform: "uppercase", letterSpacing: 1,
                  }}>
                    {r.scenario}
                  </div>
                  <div style={{
                    display: "inline-block", background: r.bg, color: r.text,
                    borderRadius: 5, padding: "3px 10px", fontSize: 11,
                    fontWeight: 800, textTransform: "uppercase", letterSpacing: 1,
                  }}>
                    {r.response}
                  </div>
                </div>
              ))}
            </div>
            <div style={{
              background: C.midGrey, borderLeft: `3px solid ${C.amber}`,
              borderRadius: "0 10px 10px 0",
              padding: compact ? "12px 16px" : "18px 20px", textAlign: "left",
              marginBottom: compact ? 14 : 24,
              animation: "slideUp 0.7s ease both", animationDelay: "0.7s", opacity: 0,
            }}>
              <p style={{ fontSize: compact ? 13 : 16, lineHeight: 1.6, margin: 0, fontWeight: 500 }}>
                These aren't failures. They're your body's survival system doing exactly what it was designed to do.
              </p>
              <p style={{
                fontSize: compact ? 13 : 16, lineHeight: 1.6,
                margin: compact ? "8px 0 0" : "10px 0 0", fontWeight: 700, color: C.amber,
              }}>
                This is the Learning Space — messy, uncomfortable, real.
              </p>
            </div>
            <p style={{
              fontSize: compact ? 12 : 14, color: "rgba(255,255,255,0.7)", margin: 0,
              animation: "fadeIn 0.8s ease both", animationDelay: "1.2s", opacity: 0, lineHeight: 1.6,
            }}>
              In this course, you'll learn to regulate your emotions.<br />
              Not control them. Not ignore them. Work with them.
            </p>
          </div>
        </div>
      );
    }

    function ThirtySeconds() {
      const [phase, setPhase] = useState("intro");
      const [roundIndex, setRoundIndex] = useState(0);
      const [responses, setResponses] = useState([]);
      const { w, h } = useViewport();

      const isPortrait = h > w;
      const isMobile = w < 1024 || "ontouchstart" in window;
      const compact = h < 500;

      const handleStart = () => { setPhase("round"); setRoundIndex(0); };

      const handleRoundComplete = (response) => {
        const next = [...responses, response];
        setResponses(next);
        if (roundIndex < TOTAL_ROUNDS - 1) {
          setTimeout(() => { setRoundIndex(roundIndex + 1); setPhase("round"); }, 250);
        } else {
          setTimeout(() => setPhase("final"), 250);
        }
      };

      if (isPortrait && isMobile) return (
        <>
          <style>{animations}</style>
          <RotatePrompt />
        </>
      );

      return (
        <>
          <style>{animations}</style>
          {phase === "intro" && <Intro onStart={handleStart} compact={compact} />}
          {phase === "round" && (
            <Round
              key={roundIndex}
              scenario={SCENARIOS[roundIndex]}
              roundIndex={roundIndex}
              timerDuration={ROUND_TIMES[roundIndex]}
              onComplete={handleRoundComplete}
              compact={compact}
            />
          )}
          {phase === "final" && <FinalReveal responses={responses} compact={compact} />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ThirtySeconds />);
  </script>
</body>
</html>
